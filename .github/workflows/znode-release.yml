name: Z-NODE Σ Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versione Release Σ (es: 1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew :znode-app:assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-NODE-release
          path: znode-app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "Z-NODE Σ v${{ github.event.inputs.version }}"
          body: |
            ## Z-NODE Σ Release ${{ github.event.inputs.version }}
            - Build automatica completata
            - APK incluso
            - Pipeline Σ attiva
          files: znode-app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
