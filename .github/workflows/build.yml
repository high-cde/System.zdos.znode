name: Z-NODE DevShell Build

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build DevShell APK
      run: ./gradlew :znode-app:assembleDebug --stacktrace

    - name: Upload DevShell APK
      uses: actions/upload-artifact@v4
      with:
        name: DevShell-APK
        path: znode-app/build/outputs/**/*.apk
